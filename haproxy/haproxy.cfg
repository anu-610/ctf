defaults
	mode http
	option httplog
  	timeout http-keep-alive 10s
	timeout http-request 30s
	timeout connect 5s
	timeout server 60s
	timeout client 30s

	option http-use-htx


frontend http
	bind *:8001
	monitor-uri /healthcheck

	acl allowed_host hdr_reg(host) -i ^(internal\.router|localhost(:[0-9]+)?|127\.0\.0\.1(:[0-9]+)?)$
	http-request deny deny_status 400 if !allowed_host

	acl ACL_router_internal hdr(host) -i internal.router
	use_backend router_internal if ACL_router_internal

	default_backend router_external


backend router_external
	http-reuse always
    server external ${SERVER_HOSTNAME}:${SERVER_PORT}


backend router_internal
	http-reuse always
	http-response del-header Server
    server internal ${SERVER_HOSTNAME}:${SERVER_PORT}